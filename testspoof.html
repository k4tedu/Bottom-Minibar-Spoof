<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Address Bar Hide Test</title>

<style>
body{
  margin:0;
  font-family:Arial;
}

/* header UI palsu untuk test */

.fakebar{
  position:sticky;
  top:0;
  background:#202124;
  color:white;
  padding:12px;
  text-align:center;
  font-size:14px;
}

/* konten tinggi supaya bisa scroll */

.content{
  height:4000px;
  background:linear-gradient(white,#e0e0e0);
  padding:20px;
}

.box{
  background:white;
  padding:30px;
  margin-top:40px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div class="fakebar">
Demo Header UI (Testing address bar hide)
</div>

<div class="content">

<div class="box">
<h2>Scroll Down</h2>
<p>
Scroll halaman ini di browser Android untuk melihat apakah address bar
browser menghilang ketika halaman bergerak ke bawah.
</p>
</div>

</div>

<script>

/*
auto scroll untuk memicu address bar hide
*/

window.onload = function(){

  setTimeout(function(){

    window.scrollTo({
      top:500,
      behavior:"smooth"
    });

  },800);

};

</script>

</body>
</html>
