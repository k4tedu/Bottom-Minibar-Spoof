<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Browser UI Test</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f2f2f2;
}

/* halaman awal */

#start{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

#start button{
  padding:20px 40px;
  font-size:22px;
  cursor:pointer;
}

/* halaman login */

#loginPage{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  width:320px;
  padding:30px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.box h2{
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button.login{
  width:100%;
  padding:12px;
}
</style>

</head>

<body>

<div id="start">
<button onclick="openPage()">Click</button>
</div>

<div id="loginPage">
<div class="box">
<h2>Account Login</h2>

<input type="text" placeholder="Email">
<input type="password" placeholder="Password">

<button class="login">Login</button>

<p style="font-size:12px;color:gray">
Demo login page for browser UI testing
</p>

</div>
</div>

<script>

function openPage(){

  document.getElementById("start").style.display="none";
  document.getElementById("loginPage").style.display="flex";

  setTimeout(triggerFind,500);
}

function triggerFind(){

  /*
  mencoba memicu fitur find
  */

  try{
    window.find("Login");
  }catch(e){
    console.log(e);
  }

}

</script>

</body>
</html>
